<html lang="ko">
<head>

  <style>
    html, body { overflow-x: hidden; width: 100%; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans KR", sans-serif; background: #f5f5f5; padding: 15px 0; text-align: center; }

/* 기본 컨테이너 스타일 - 넓게 표시 */
.container { 
  max-width: 100%; 
  width: 100%; 
  padding: 0 10px; 
  margin: 0 auto; 
  overflow-x: hidden; 
}
@media (min-width: 900px) { 
  .container { 
    max-width: 1200px; 
    padding: 0; 
  } 
}

/* 상세 뷰 컨테이너 - 너비 제한 및 중앙 정렬 */
.detail-view {
  display: none;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  padding: 20px 0;
  margin-bottom: 20px;
  /* 너비 제한 및 중앙 정렬 */
  max-width: 800px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
}

/* 상세 뷰 내부 요소들이 컨테이너를 벗어나지 않도록 함 */
.detail-content, 
.detail-images img, 
.accordion, 
.panel {
  max-width: 100%;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  padding: 0 15px;
  box-sizing: border-box;
}

/* 이미지는 여백 없이 가득 채우도록 */
.detail-images img {
  padding: 0;
  border-radius: 0;
}

    .header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 28px; color: #03C75A; font-weight: 700; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); letter-spacing: 1px; background: linear-gradient(135deg, #03C75A, #029f47); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header a { text-decoration: none; color: inherit; }

    /* 상위 컨테이너 */
    .filter-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 100%;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .search-and-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .search-bar {
      flex: 1 1 300px;
      max-width: 400px;
      min-width: 250px;
    }

    #search-input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .dropdown-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      min-width: 150px;
      background-color: white;
      cursor: pointer;
      width: 100%;
    }

    .masonry-container { display: grid; gap: 15px; width: 100%; }
    .grid-item { width: 100%; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
    .grid-item:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.15); }
    .card-img { width: 100%; height: auto; max-height: 480px; overflow: hidden; position: relative; flex-shrink: 0; background-color: #eee; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; transition: opacity 0.3s; opacity: 0; }
    .card-img img.loaded { opacity: 1; }
    .card-img.no-image { display: none; }
    .card-content { padding: 10px 15px 15px; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .card-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 6px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-excerpt { font-size: 13px; color: #555; line-height: 1.4; word-wrap: break-word; overflow: hidden; flex: 1; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 4; text-overflow: ellipsis; margin-bottom: 8px; }
    .card-timestamp { font-size: 11px; color: #888; margin-top: auto; padding-top: 8px; border-top: 1px solid #eee; }
    .grid-item.text-only .card-img { display: none; }
    .grid-item.text-only .card-excerpt { -webkit-line-clamp: 8; }

    .detail-view { display: none; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 20px 0; margin-bottom: 20px; }
    .detail-header { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; text-align: center; }
    .detail-title p { color: #666; font-size: 13px; }
    .detail-content { line-height: 1.7; margin-bottom: 20px; font-size: 15px; color: #444; max-width: 800px; margin-left: auto; margin-right: auto; text-align: left; padding: 0 15px; }
    .detail-content .first-paragraph { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #111; }
    .detail-content p { margin-bottom: 0.8em; }
    .detail-images { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-bottom: 20px; }

    .accordion { background: #03C75A; color: white; cursor: pointer; padding: 12px 15px; width: 100%; border: none; text-align: left; outline: none; font-size: 15px; transition: background 0.3s; margin-top: 15px; max-width: 800px; margin-left: auto; margin-right: auto; border-radius: 5px; }

    .panel { padding: 0 15px; display: none; overflow: hidden; max-width: 800px; margin-left: auto; margin-right: auto; text-align: left; background: #fff; border-radius: 0 0 5px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .panel p { padding: 15px; font-size: 15px; color: #444; }
    .panel a { color: #03C75A; text-decoration: none; }

    .refresh-button { position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px; background: #03C75A; color: white; border: none; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.2); z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .refresh-button svg { width: 22px; height: 22px; }

    #loading-indicator, #no-results { display: none; margin: 20px auto; text-align: center; color: #777; font-size: 14px; }

    /* 데스크탑: 한 줄 배치 */
    @media (min-width: 901px) {

      .search-bar {

      select {
        width: auto;
        min-width: 150px;

    @media (max-width: 900px) {

        grid-template-columns: repeat(2, 1fr) !important; 
      }
      select {
        font-size: 13px;
        padding: 6px;
      }
    }

 땅을 수호한다는 믿음이 담겨 있습니다.<br>🌏 [골든트라이앵글] 세 나라가 만나는 신비로운 황금의 삼각지대<br>태국, 미얀마, 라오스 3개국의 국경이 메콩강을 사이에 두고 맞닿아 있는 세계적인 접경 지역입니다. 과거의 파란만장한 역사와 현재의 평화로운 강줄기가 공존하는 치앙라이 여행의 필수 코스입니다.<br>강 건너편으로 **태국(내 발밑), 미얀마(왼쪽), 라오스(오른쪽)**를 동시에 바라볼 수 있는 신기한 경험을 할 수 있습니다.<br>💙 [블루 사원] 신비로운 푸른 빛의 향연, 왓 렁 쓰아 텐<br>치앙라이의 '화이트 템플'과 함께 쌍벽을 이루는 예술 사원입니다. 태국어로 **'춤추는 호랑이의 사원'**이라는 뜻을 가진 이곳은, 과거 이곳에 호랑이들이 많이 살며 강을 뛰어넘어 다녔다는 전설에서 유래되었습니다. 신성한 사원이므로 어깨나 무릎이 드러나는 옷은 피해주셔야 합니다. (현장에서 스카프 등을 대여하거나 구매할 수 있습니다.) 👗<br>🕊️ [백색 사원] 순백의 예술, 왓 롱 쿤 (Wat Rong Khun) ✨<br>치앙라이를 상징하는 세계적인 건축가 '찰름차이'가 설계한 이곳은, 기존의 황금빛 사원 틀을 깨고 전체무결한 흰색으로 지어진 **'지상 위의 천국'**입니다. 🏛️🤍<br>흰색은 불교에서 **'청정함'과 '지혜'**를 의미합니다. 부처님의 가르침이 세상의 어떤 욕심이나 때에도 물들지 않은 순수하고 깨끗한 상태임을 시각적으로 표현하기 위해 사원 전체를 흰색으로 칠했습니다.<br>⛰️ [도이인타논] 태국의 지붕, 히말라야의 끝자락 ☁️<br>해발 2,565m! 태국에서 가장 높은 산이자 **'태국의 지붕'**이라 불리는 도이인타논 국립공원은 히말라야 산맥이 시작되는 지점으로도 유명합니다. 연중 시원하고 쾌적한 날씨 덕분에 태국 현지인들도 평생 꼭 한 번 가보고 싶어 하는 최고의 명소입니다.<br>🏔️ 치앙마이의 황금빛 심장, 도이수텝 사원 ✨<br>도이수텝은 해발 1,053m 산 정상에 위치해 치앙마이 시내를 한눈에 조망할 수 있는 태국 북부의 가장 신성한 사원입니다. 1383년 란나 왕조 시대에 건립되었으며, 부처의 사리를 등에 태운 흰 코끼리가 스스로 산을 올라 자리를 잡았다는 신비로운 전설을 간직하고 있습니다. 🐘<br>사원의 중심에는 압도적인 존재감을 드러내는 거대한 **황금빛 불탑(체디)**이 솟아 있으며, 이를 둘러싼 정교한 불상들과 화려한 단청은 태국 불교 예술의 정수를 보여줍니다. 🕌 300여 개의 계단을 걸어 올라가며 만나는 수호신 '나가'의 형상과 정상 전망대에서 내려다보는 파노라마 뷰는 방문객들에게 깊은 감동을 선사합니다. 🌅 낮에는 태양 아래 눈부시게 빛나고 밤에는 은은한 조명으로 신비로움을 더하는 이곳은 치앙마이의 역사와 영성이 공존하는 최고의 명소입니다. 🌟<br>🏛️ 세월의 무게가 느껴지는 거대 불탑, 왓 체디 루앙 ✨<br>왓 체디 루앙은 치앙마이 올드타운 한복판에 위치한 사원으로, '거대한 탑'이라는 이름에 걸맞게 압도적인 규모를 자랑하는 치앙마이의 상징입니다. 🧱 14세기 란나 왕조 시대에 건립될 당시에는 높이가 약 80m에 달해 도시 어디에서나 보일 정도였으나, 16세기 대지진으로 윗부분이 무너져 현재는 약 60m의 거친 벽면이 남은 독특하고 신비로운 형상을 띠고 있습니다. 📜<br>🧱 치앙마이의 과거와 현재가 만나는 곳, '타페 게이트' ✨<br>타페 게이트는 과거 외적의 침입을 막기 위해 치앙마이 올드타운을 둘러쌓았던 성벽의 동쪽 문으로, 오늘날 치앙마이 여행의 상징과도 같은 장소입니다. 🏰 붉은 벽돌로 이루어진 고풍스러운 성벽은 수백 년의 역사를 묵묵히 품고 있으며, 성벽을 배경으로 날아오르는 비둘기들과 함께 찍는 사진은 치앙마이 여행의 필수 인증샷 코스로 사랑받고 있습니다. 📸<br>이곳은 단순한 유적지를 넘어, 매주 일요일마다 열리는 거대 야시장인 '선데이 마켓'의 시작점이자 도시의 주요 축제와 행사가 열리는 소통의 광장이기도 합니다.<br>⛱️ 화려한 꽃비가 내리는 예술의 거리, '보쌍 우산마을' 🎨<br>보쌍 우산마을은 치앙마이 시내에서 동쪽으로 약 9km 떨어진 곳에 위치한 전통 수공예 마을로, 태국을 대표하는 화려한 종이우산 제작지로 유명합니다. ✨ 약 200년 전 한 스님이 미얀마에서 기술을 배워온 것에서 시작된 이곳은, 뽕나무 종이(사 종이)와 면사, 대나무 살을 이용해 정성스럽게 우산을 만드는 장인들의 숨결이 살아 숨 쉬는 곳입니다. 🎋<br>🌙 밤마다 펼쳐지는 빛의 축제, 치앙마이 나이트 바자 🛍️<br>나이트 바자는 치앙마이 창클란 거리를 따라 매일 밤 펼쳐지는 태국 북부 최대 규모의 야시장으로, 치앙마이의 활기찬 밤 문화를 대표하는 명소입니다. ✨ 해가 지면 거리 곳곳에 수백 개의 노점이 들어서며, 정교한 수공예품부터 세련된 의류, 독특한 인테리어 소품까지 태국 북부 특유의 감성이 담긴 다양한 아이템을 만나볼 수 있습니다. 🎨<br>☕ 치앙마이의 가로수길, 감성 가득한 '님만해민' ✨<br>님만해민은 치앙마이에서 가장 현대적이고 세련된 에너지가 넘치는 거리로, '태국의 가로수길'이라 불릴 만큼 감각적인 카페와 갤러리, 편집숍들이 모여 있는 핫플레이스입니다. 🏙️ 골목마다 개성 넘치는 디자인의 건물과 아기자기한 소품샵들이 자리하고 있어, 목적 없이 걷는 것만으로도 여행의 설렘과 영감을 선사하는 곳입니다. 🎨<br>🍱 란나 왕조의 귀빈이 된 기분, '쿰칸톡 디너쇼' 👑<br>쿰칸톡은 태국 북부의 전통 상차림인 '칸톡(Khantoke)' 식사와 함께 화려한 민속 공연을 즐길 수 있는 치앙마이의 대표적인 문화 체험 코스입니다. 🏮 '칸'은 그릇, '톡'은 낮은 원형 상을 의미하며, 옛 란나 왕조 시절 귀한 손님을 대접하던 전통 방식을 그대로 재현해 여행객들에게 특별한 저녁 시간을 선사합니다. 🍛<br>💦 세상에서 가장 시원한 새해맞이, '쏭크란 축제' 🐘<br>쏭크란은 매년 4월 13일부터 15일까지 열리는 태국의 전통 설날로, 태국에서 가장 크고 중요한 명절이자 세계적인 물 축제입니다. ☀️ 태국에서 일 년 중 가장 더운 시기에 열리는 이 축제는, 서로에게 물을 뿌리며 지난 한 해의 액운을 씻어내고 새해의 복과 번영을 기원하는 아름다운 의미를 담고 있습니다. ✨<br>치앙마이의 쏭크란은 태국 내에서도 가장 화려하고 전통적인 색채가 강하기로 유명합니다. 🏰 올드타운을 둘러싼 해자 주변에는 수만 명의 사람들이 모여 물총과 바가지를 들고 시원한 물싸움을 즐기며, 거리 곳곳에서는 정교하게 장식된 불상을 모시고 행진하는 퍼레이드와 전통 공연이 펼쳐집니다.<br>🕯️ 물 위로 흐르는 별빛의 향연, '러이끄라통 축제' ✨<br>러이끄라통은 매년 태국 음력 12월 보름달이 뜨는 밤, 물의 신에게 감사 인사를 전하고 액운을 띄워 보내는 태국의 전통 축제입니다. 🌕 '러이(Loy)'는 띄우다, '끄라통(Krathong)'은 연꽃 모양의 작은 배를 의미하며, 바나나 잎과 꽃으로 정성스럽게 만든 배에 초와 향을 실어 강물에 띄우며 저마다의 간절한 소망을 비는 시간을 갖습니다. 🪷<br>특히 치앙마이에서는 러이끄라통 기간에 하늘로 풍등을 날려 보내는 '이펭(Yi Peng)' 축제가 함께 열려, 수천 개의 풍등이 은하수처럼 밤하늘을 채우는 장관을 연출합니다.","photos":["https://coresos-phinf.pstatic.net/a/39a86c/0_cf9Ud018svcps3jr8k4uh69_e0h5y4.png","https://coresos-phinf.pstatic.net/a/39a8hf/4_4f9Ud018svc838ce0zm95xh_e0h5y4.jpg","https://coresos-phinf.pstatic.net/a/39a8b2/4_6f9Ud018svc1i6jnaczuv68w_e0h5y4.jpg","https://coresos-phinf.pstatic.net/a/39a8i6/c_5fbUd018svc1o6ys8ew88uru_e0h5y4.jpg","https://coresos-phinf.pstatic.net/a/399b78/3_g9iUd018svc1qyei3ful32l2_e0h5y4.jpg","https://coresos-phinf.pstatic.net/a/39       if (!masonryContainer) return;
      var width = window.innerWidth;
      var columns = width <= 480 ? 1 : width <= 600 ? 2 : width <= 900 ? 3 : width <= 1200 ? MAX_COLUMNS : MAX_COLUMNS;
      masonryContainer.style.gridTemplateColumns = "repeat(" + columns + ", 1fr)";
    }
    window.addEventListener("resize", setColumnCount);

    function debounce(func, wait) {
      var timeout;
      return function executedFunction() {
        var context = this;
        var args = arguments;
        var later = function() { timeout = null; func.apply(context, args); };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function createTextOnlyHTML(index) {
      var post = postsData[index];
      return '<div class="card-text-only"><div class="card-title">' + post.title + '</div><div class="card-excerpt">' + (post.content || "") + '</div><div class="card-timestamp">' + formatDate(post.createdAt) + '</div></div>';
    }

    function loadMorePosts() {
      if (isLoadingMore || currentIndex >= postsData.length) return;
      isLoadingMore = true;
      document.getElementById('loading-indicator').style.display = 'block';
      var grid = document.getElementById('masonry-grid');
      var fragment = document.createDocumentFragment();
      var end = Math.min(currentIndex + batchSize, postsData.length);
      for (var i = currentIndex; i < end; i++) {
        var post = postsData[i];
        var card = document.createElement("div");
        card.className = "grid-item";
        card.setAttribute("data-index", i);
        card.onclick = (function(idx) { return function() { showDetail(idx); }; })(i);
        var hasImage = post.photos && post.photos.length > 0 && post.photos[0];
        card.innerHTML = hasImage
          ? '<div class="card-img"><img src="' + post.photos[0] + '" loading="lazy" alt="게시물 이미지" onerror="this.parentNode.parentNode.innerHTML=createTextOnlyHTML(' + i + ')"></div>' +
            '<div class="card-content"><div class="card-title">' + post.title + '</div><div class="card-excerpt">' + (post.content || "") + '</div><div class="card-timestamp">' + formatDate(post.createdAt) + '</div></div>'
          : createTextOnlyHTML(i);
        if (hasImage) {
          var img = card.querySelector('img');
          if (img) { img.onload = function() { this.classList.add('loaded'); }; }
        } else {
          card.classList.add('text-only');
        }
        fragment.appendChild(card);
      }
      grid.appendChild(fragment);
      currentIndex = end;
      setColumnCount();
      isLoadingMore = false;
      document.getElementById('loading-indicator').style.display = 'none';
      document.getElementById('no-results').style.display = (currentIndex === 0 && postsData.length === 0) ? 'block' : 'none';
    }

    function formatContentWithTitleParagraph(content) {
      var paragraphs = content.split("<br>").filter(function(p) { return p.trim(); });
      if (paragraphs.length > 0) {
        var html = '<p class="first-paragraph">' + paragraphs[0] + '</p>';
        for (var i = 1; i < paragraphs.length; i++) { html += "<p>" + paragraphs[i] + "</p>"; }
        return html;
      }
      return content || "내용 없음";
    }

    function loadDetailImages(photoUrls, container) {
      var fragment = document.createDocumentFragment();
      photoUrls.forEach(function(url) {
        if (!url) return;
        var img = document.createElement("img");
        img.src = url;
        img.alt = "게시물 이미지";
        img.loading = "lazy";
        img.onerror = function() { this.style.display = "none"; };
        fragment.appendChild(img);
      });
      container.appendChild(fragment);
    }

    function showDetail(index, saveState) {
      saveState = saveState !== false;
      var post = postsData[index];
      if (!post) return;
      lastScrollPosition = window.scrollY;
      var detailView = document.getElementById("detail-view");
      var grid = document.getElementById("masonry-grid");
      var searchAndFilter = document.querySelector(".filter-container");
      var detailDate = document.getElementById("detail-date");
      var detailContent = document.getElementById("detail-content");
      var imagesContainer = document.getElementById("detail-images");
      var bandLink = document.getElementById("band-link");
      var accordion = document.querySelector(".accordion");
      var panel = accordion ? accordion.nextElementSibling : null;
      detailDate.textContent = formatDate(post.createdAt);
      detailContent.innerHTML = formatContentWithTitleParagraph(post.title + "<br>" + (post.content || ""));
      imagesContainer.innerHTML = "";
      if (post.photos && post.photos.length) { loadDetailImages(post.photos, imagesContainer); }
      if (bandLink) { bandLink.innerHTML = post.bandUrl ? '<a href="' + post.bandUrl + '" target="_blank">' + post.supplier + '</a>' : post.supplier; }
      if (accordion && panel) { accordion.classList.remove('active'); panel.style.display = 'none'; }
      detailView.style.display = "block";
      grid.style.display = "none";
      searchAndFilter.style.display = "none";
      window.scrollTo(0, 0);
      if (saveState && window.history) { window.history.pushState({ postId: index, view: "detail" }, "", "?post=" + index); }
    }

    function showList(saveState) {
      var detailView = document.getElementById("detail-view");
      var grid = document.getElementById("masonry-grid");
      var searchAndFilter = document.querySelector(".filter-container");
      detailView.style.display = "none";
      grid.style.display = "grid";
      searchAndFilter.style.display = "flex";
      window.scrollTo(0, lastScrollPosition);
    }

    function filterPosts(query) {
      var filtered = query ? originalPostsData.filter(function(post) {
        return (post.title || '').toLowerCase().includes(query.toLowerCase()) || (post.content || '').toLowerCase().includes(query.toLowerCase());
      }) : originalPostsData;
      postsData = filtered;
      currentIndex = 0;
      var grid = document.getElementById("masonry-grid");
      grid.innerHTML = "";
      loadMorePosts();
    }

    function filterByDropdown(keyword) {
      var filtered = keyword ? originalPostsData.filter(function(post) {
        return (post.title || '').includes(keyword) || (post.content || '').includes(keyword);
      }) : originalPostsData;
      postsData = filtered;
      currentIndex = 0;
      var grid = document.getElementById("masonry-grid");
      grid.innerHTML = "";
      loadMorePosts();
    }

    function filterByBandName(bandName) {
      var filtered = bandName ? originalPostsData.filter(function(post) {
        return (post.supplier || '').toLowerCase() === bandName.toLowerCase();
      }) : originalPostsData;
      postsData = filtered;
      currentIndex = 0;
      var grid = document.getElementById("masonry-grid");
      grid.innerHTML = "";
      loadMorePosts();
    }

    document.addEventListener("DOMContentLoaded", function() {
      try { initializeApp(); } catch (e) { console.error("페이지 초기화 오류: " + e.message); }
    });

    function initializeApp() {
      var urlParams = new URLSearchParams(window.location.search);
      var postIdParam = urlParams.get("post");
      if (postIdParam !== null && postsData[parseInt(postIdParam)]) { showDetail(parseInt(postIdParam), false); }
      else { loadMorePosts(); }
      scrollHandler = debounce(function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500 && !isLoadingMore) { loadMorePosts(); }
      }, 200);
      window.addEventListener("scroll", scrollHandler);
      var accordion = document.querySelector(".accordion");
      if (accordion) {
        accordion.addEventListener("click", function() {
          this.classList.toggle("active");
          var panel = this.nextElementSibling;
          if (panel && panel.classList.contains('panel')) {
            panel.style.display = panel.style.display === "block" ? "none" : "block";
          } else { console.error("Accordion panel error."); }
        });
      } else { console.warn("Accordion element not found."); }
      document.getElementById("search-input").addEventListener("input", function(e) { filterPosts(e.target.value); });
      setupDropdownListeners();
      updateDestinationDropdown("");
      updateSupplierDropdown();
      setColumnCount();
    }

    function setupDropdownListeners() {
      var countryDropdown = document.getElementById("country-dropdown");
      var destDropdown = document.getElementById("destination-dropdown");
      var supplierDropdown = document.getElementById("supplier-dropdown");
      countryDropdown.addEventListener("change", function() {
        lastSelectedKeyword = this.value;
        updateDestinationDropdown(this.value);
        filterByDropdown(lastSelectedKeyword);
      });
      destDropdown.addEventListener("change", function() {
        lastSelectedKeyword = this.value;
        filterByDropdown(lastSelectedKeyword);
      });
      supplierDropdown.addEventListener("change", function() { filterByBandName(this.value); });
    }

    function updateDestinationDropdown(country) {
      var destDropdown = document.getElementById("destination-dropdown");
      var destinations = country ? (categoryMap[country] || []) : allDestinations;
      destDropdown.innerHTML = '<option value="">도시 전체</option>' + destinations.map(function(dest) {
        return '<option value="' + dest + '">' + dest + '</option>';
      }).join("");
    }

    function updateSupplierDropdown() {
      var supplierDropdown = document.getElementById("supplier-dropdown");
      var supplierOptions = suppliers.map(function(supplier) {
        var count = originalPostsData.filter(function(post) {
          return (post.supplier || post.bandName || '알 수 없음') === supplier;
        }).length;
        return '<option value="' + supplier + '">' + supplier + ' (' + count + ')</option>';
      }).join("");
      supplierDropdown.innerHTML = '<option value="">공급처 전체</option>' + supplierOptions;
    }

    window.addEventListener("popstate", function(event) {
      var state = event.state;
      if (state && state.view === "detail" && postsData[state.postId]) { showDetail(state.postId, false); }
      else { showList(false); }
    });
  </script>
</body>
</html>
